services:
  - type: web
    name: unpuzzle-life
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/data/data.db
    disk:
      name: data
      mountPath: /opt/render/data
      sizeGB: 1
